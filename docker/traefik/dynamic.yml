# Маршруты без Docker provider (надёжно на Docker Desktop / Windows).
# Приоритет: API (100) выше catch-all SPA (1), иначе PathPrefix(`/`) перехватит /catalog и т.д.
http:
  routers:
    catalog:
      rule: PathPrefix(`/catalog`)
      priority: 100
      entryPoints: [web]
      middlewares: [catalog-strip]
      service: catalog-svc
    finance:
      rule: PathPrefix(`/finance`)
      priority: 100
      entryPoints: [web]
      middlewares: [finance-strip]
      service: finance-svc
    identity:
      rule: PathPrefix(`/identity`)
      priority: 100
      entryPoints: [web]
      middlewares: [identity-strip]
      service: identity-svc
    warehouse:
      rule: PathPrefix(`/warehouse`)
      priority: 100
      entryPoints: [web]
      middlewares: [warehouse-strip]
      service: warehouse-svc
    logistics:
      rule: PathPrefix(`/logistics`)
      priority: 100
      entryPoints: [web]
      middlewares: [logistics-strip]
      service: logistics-svc
    orders:
      rule: PathPrefix(`/orders`)
      priority: 100
      entryPoints: [web]
      middlewares: [orders-strip]
      service: orders-svc
    # Flutter Web (nginx), всё остальное на порту 80
    frontend:
      rule: PathPrefix(`/`)
      priority: 1
      entryPoints: [web]
      service: frontend-svc

  middlewares:
    catalog-strip:
      stripPrefix:
        prefixes: ["/catalog"]
    finance-strip:
      stripPrefix:
        prefixes: ["/finance"]
    identity-strip:
      stripPrefix:
        prefixes: ["/identity"]
    warehouse-strip:
      stripPrefix:
        prefixes: ["/warehouse"]
    logistics-strip:
      stripPrefix:
        prefixes: ["/logistics"]
    orders-strip:
      stripPrefix:
        prefixes: ["/orders"]

  services:
    catalog-svc:
      loadBalancer:
        servers: [{ url: "http://catalog:8000" }]
    finance-svc:
      loadBalancer:
        servers: [{ url: "http://finance:8000" }]
    identity-svc:
      loadBalancer:
        servers: [{ url: "http://identity:8000" }]
    warehouse-svc:
      loadBalancer:
        servers: [{ url: "http://warehouse:8000" }]
    logistics-svc:
      loadBalancer:
        servers: [{ url: "http://logistics:8000" }]
    orders-svc:
      loadBalancer:
        servers: [{ url: "http://orders:8000" }]
    frontend-svc:
      loadBalancer:
        servers: [{ url: "http://frontend:80" }]
