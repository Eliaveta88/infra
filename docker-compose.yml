# GastroRoute — Postgres + Redis + Traefik + Flutter Web + 6 микросервисов.
# UI: http://localhost/ (Flutter Web за nginx)
# HTTP API: через Traefik → http://localhost/<service>/api/v1/...
#   catalog → /catalog, finance → /finance, identity → /identity,
#   warehouse → /warehouse, logistics → /logistics, orders → /orders
# Дашборд Traefik: http://localhost:8080/dashboard/ (порт 8080 только на 127.0.0.1)
#
# Переменные окружения: см. .env.example (реальные секреты — только в .env, не в git).
#
# Запуск: docker compose up -d --build
# Postgres: 127.0.0.1:5432, Redis: 127.0.0.1:6379 (DBeaver, redis-cli).
# Доп. порты сервисов на хост: см. docker-compose.local.yml
#
# Миграции Alembic: ENTRYPOINT в docker/Dockerfile каждого сервиса.
# Traefik: маршруты в docker/traefik/dynamic.yml (file provider — без Docker socket API).

name: gastroroute

services:
  traefik:
    image: traefik:v3.4
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped

  # Один контейнер Postgres, внутри — РАЗНЫЕ базы по доменам: catalog, finance, identity,
  # warehouse, logistics, orders (см. docker/postgres/init-databases.sql и docs/database_domains.md).
  # У каждого сервиса свой DATABASE_URL …/имя_базы — таблицы не смешиваются.
  postgres:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastro}
      POSTGRES_DB: catalog
    ports:
      - "127.0.0.1:5432:5432"
    # PG 18+: том монтируется в /var/lib/postgresql (не в …/data), см. docker-library/postgres#1259
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/02-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastro} -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.6.1-trixie
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-devredis}",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  catalog:
    build:
      context: ./GastroRoute_catalog
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/catalog
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  finance:
    build:
      context: ./GastroRoute_finance
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/finance
      ORDERS_BASE_URL: http://orders:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  identity:
    build:
      context: ./GastroRoute_identity
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/identity
      JWT_SECRET: ${JWT_SECRET:-gastroroute-dev-jwt-secret-key-min-32bytes}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  warehouse:
    build:
      context: ./GastroRoute_warehouse
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/warehouse
      CATALOG_BASE_URL: http://catalog:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  logistics:
    build:
      context: ./GastroRoute_logistics
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/logistics
      IDENTITY_BASE_URL: http://identity:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  orders:
    build:
      context: ./GastroRoute_orders
      dockerfile: docker/Dockerfile
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gastro}:${POSTGRES_PASSWORD:-gastro}@postgres:5432/orders
      CATALOG_BASE_URL: http://catalog:8000
      IDENTITY_BASE_URL: http://identity:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Flutter Web (статика nginx) — в Traefik см. router `frontend` (priority 1)
  frontend:
    build:
      context: ./GastroRoute_frontend
      dockerfile: docker/Dockerfile
    restart: unless-stopped

volumes:
  postgres_data:
    name: gastroroute_postgres_data
  redis_data:
    name: gastroroute_redis_data
