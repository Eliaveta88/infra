# Продакшен-оверлей для Traefik: без dashboard и без insecure API.
# Порт 8080 в базовом compose не публикуется; для дашборда в dev используйте docker-compose.local.yml.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# HTTPS: см. раздел «Продакшен» в docs/SECURITY.md.

services:
  traefik:
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --accesslog=true
      - --accesslog.format=json

  # Обязательный вход включён по умолчанию в образе фронта (см. frontend/docker/Dockerfile).
