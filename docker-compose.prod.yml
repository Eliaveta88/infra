# Продакшен-оверлей для Traefik: без dashboard и без insecure API (порт 8080 не нужен).
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Перед деплоем в базовом docker-compose.yml закомментируйте у traefik строку с портом 8080,
# если не хотите слушать API на localhost. HTTPS: см. раздел «Продакшен» в docs/SECURITY.md.
# Трейсинг (Jaeger) сохраняется; при отдельном OTLP-коллекторе замените endpoint в команде traefik.

services:
  traefik:
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --tracing=true
      - --tracing.serviceName=gastroroute-traefik
      - --tracing.otlp.grpc=true
      - --tracing.otlp.grpc.endpoint=jaeger:4317
      - --tracing.otlp.grpc.insecure=true
      - --accesslog=true
      - --accesslog.format=json
    environment:
      OTEL_PROPAGATORS: tracecontext,baggage
    depends_on:
      jaeger:
        condition: service_started
