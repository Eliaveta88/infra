name: Frontend CI

on:
  push:
    branches: [master, main]
    paths:
      - "GastroRoute_frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    paths:
      - "GastroRoute_frontend/**"
      - ".github/workflows/ci-frontend.yml"

defaults:
  run:
    working-directory: GastroRoute_frontend

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: analyze
        run: flutter analyze

      - name: test
        run: flutter test
