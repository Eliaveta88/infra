name: Integration tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start Docker Compose
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for HTTP health
        shell: bash
        run: |
          set -e
          for i in $(seq 1 40); do
            if curl -sf http://localhost/catalog/api/v1/health \
              && curl -sf http://localhost/identity/api/v1/health; then
              echo "Stack is up."
              exit 0
            fi
            sleep 5
          done
          echo "Timeout waiting for health endpoints" >&2
          docker compose -f docker-compose.yml ps
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r tests_api/requirements.txt

      - name: Run pytest
        env:
          API_BASE_URL: http://localhost
        run: pytest tests_api -v
