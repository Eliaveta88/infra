name: CI

# Приватные субмодули: в настройках репозитория добавьте secret SUBMODULES_ACCESS_TOKEN —
# classic PAT с scope «repo» или fine-grained с Contents: Read на infra и все GastroRoute_* репозитории.
# Без него actions/checkout не сможет клонировать субмодули (GITHUB_TOKEN видит только текущий репозиторий).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  flutter:
    # На PR из fork секреты недоступны — без PAT субмодули не клонируются; job пропускаем.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GastroRoute_frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_ACCESS_TOKEN }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  pip-audit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - GastroRoute_catalog
          - GastroRoute_finance
          - GastroRoute_identity
          - GastroRoute_logistics
          - GastroRoute_orders
          - GastroRoute_warehouse
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_ACCESS_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -e .
          python -m pip_audit

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config --quiet
